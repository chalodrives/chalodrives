<!DOCTYPE html>
<html>
<head>
  <title>ChaloDrives</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body { margin:0; font-family: Arial; background:#f5f5f5; }

    header {
      background:#111;
      color:white;
      text-align:center;
      padding:15px;
    }

    #car-list {
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
      gap:20px;
      padding:20px;
    }

    .car-card {
      background:white;
      border-radius:10px;
      box-shadow:0 5px 10px rgba(0,0,0,0.1);
      overflow:hidden;
    }

    .car-card img {
      width:100%;
      height:150px;
      object-fit:cover;
    }

    .car-info {
      padding:15px;
    }

    button {
      width:100%;
      padding:10px;
      background:blue;
      color:white;
      border:none;
      border-radius:5px;
      margin-top:10px;
    }
  </style>
</head>

<body>

<header>
  <h2>ChaloDrives Rentals</h2>
</header>

<div id="car-list"></div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
const firebaseConfig = {
  databaseURL: "https://chalodrives-c44d7-default-rtdb.asia-southeast1.firebasedatabase.app"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

db.ref("cars").on("value", (snapshot) => {
  const data = snapshot.val();
  const container = document.getElementById("car-list");

  if (!data) {
    container.innerHTML = "No cars available";
    return;
  }

  container.innerHTML = Object.values(data).map(car => `
    <div class="car-card">
      <img src="${car.image}">
      <div class="car-info">
        <h3>${car.name}</h3>
        <p>₹${car.price}/day</p>
        <p>${car.fuel} | ${car.seats} seats</p>
        <button>Book Now</button>
      </div>
    </div>
  `).join('');
});
</script>

</body>
</html>
