<!DOCTYPE html>
<html>
<head>
  <title>ChaloDrives</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body { margin:0; font-family: Arial; background:#f5f5f5; }

    header {
      background:#111;
      color:white;
      text-align:center;
      padding:15px;
    }

    #car-list {
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
      gap:20px;
      padding:20px;
    }

    .car-card {
      background:white;
      border-radius:10px;
      box-shadow:0 5px 10px rgba(0,0,0,0.1);
      overflow:hidden;
    }

    .car-card img {
      width:100%;
      height:150px;
      object-fit:cover;
    }

    .car-info {
      padding:15px;
    }

    button {
      width:100%;
      padding:10px;
      background:blue;
      color:white;
      border:none;
      border-radius:5px;
      margin-top:10px;
    }
  </style>
</head>

<body>

<header style="background:#0f172a;padding:20px;text-align:center;color:white;">

  <img src="img/chalodrives-logo.png" 
       style="height:80px;display:block;margin:auto;">

  <h2 style="margin:10px 0 5px;">ChaloDrives Rentals</h2>

  <p style="font-size:14px;color:#ccc;">
    Most Trusted Self Drive Car Rentals in Hyderabad
  </p>

  <!-- CONTACT -->
  <div style="margin-top:10px;font-size:14px;">
    📞 9133666641 | 9912223232 <br>
    ✉️ chalodrives@gmail.com
  </div>

  <!-- WhatsApp -->
  <a href="https://wa.me/919000509072" target="_blank"
     style="display:inline-block;margin-top:10px;background:#25D366;padding:8px 15px;border-radius:6px;color:white;text-decoration:none;">
     WhatsApp Booking
  </a>

</header>
<div id="car-list"></div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
const firebaseConfig = {
  databaseURL: "https://chalodrives-c44d7-default-rtdb.asia-southeast1.firebasedatabase.app"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

db.ref("cars").on("value", (snapshot) => {
  const data = snapshot.val();
  const container = document.getElementById("car-list");

  if (!data) {
    container.innerHTML = "No cars available";
    return;
  }

  container.innerHTML = Object.values(data).map(car => `
  <div class="car-card">
    <h3>${car.name}</h3>
    <p>Price: ₹${car.price}/day</p>
    <p>${car.available ? "Available" : "Not Available"}</p>

    <a href="https://wa.me/919000509072?text=I want to book ${car.name}" target="_blank">
      <button>Book Now</button>
    </a>

  </div>
`).join('');
});
  function bookCar(carName) {

  let name = document.getElementById("custName").value;
  let date = document.getElementById("pickupDate").value;
  let location = document.getElementById("location").value;

  if(!name || !date || !location){
    alert("Please fill all details");
    return;
  }

  let message = `Hello ChaloDrives,%0A
Name: ${name}%0A
Car: ${carName}%0A
Pickup Date: ${date}%0A
Location: ${location}`;

  window.open(`https://wa.me/919000509072?text=${message}`, '_blank');
}
</script>

</body>
</html>
