<!DOCTYPE html>
<html>
<head>
  <title>Book Car - ChaloDrives</title>
</head>
  <head>
<style>
body {
  font-family: Arial;
  background: #f5f5f5;
}

.booking-container {
  max-width: 400px;
  margin: 60px auto;
  background: white;
  padding: 25px;
  border-radius: 10px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

.booking-container input,
.booking-container select {
  width: 100%;
  padding: 10px;
  margin: 10px 0;
}
</style>
</head>
<body>





<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<script>
function payNow() {
  var options = {
    "key": "rzp_test_SUdyqnn01ZiC5C",
    "amount": "50000",
    "currency": "INR",
    "name": "ChaloDrives",
    "description": "Car Booking Advance",
    "handler": function (response){
        alert("Booking Successful!");
    }
  };
  var rzp1 = new Razorpay(options);
  rzp1.open();
}
</script>
<script>
const params = new URLSearchParams(window.location.search);
const selectedCar = params.get("car");

if (selectedCar) {
  const dropdown = document.querySelector("select");
  dropdown.value = decodeURIComponent(selectedCar);
}
</script>
</body>
  <body>

<div class="booking-container">
  <h2>Book Your Car</h2>

  <input type="text" placeholder="Your Name">
  <input type="text" placeholder="Phone Number">

  <label>Pickup Date</label>
  <input type="date">

  <label>Drop Date</label>
  <input type="date">

  <select>
    <option>Maruti Swift</option>
    <option>Maruti Baleno</option>
    <option>Maruti Suzuki Ertiga</option>
    <option>Maruti Dzire</option>
    <option>Maruti Grand Vitara</option>
    <option>Baleno Automatic</option>
    <option>Tata Nexon</option>
    <option>Maruti Ciaz</option>
    <option>Honda City</option>
    <option>Maruti Brezza</option>
  </select>

  <button>Pay ₹500 Advance</button>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const selectedCar = params.get("car");

if (selectedCar) {
  const dropdown = document.querySelector("select");
  dropdown.value = decodeURIComponent(selectedCar);
}
</script>

</body>
</body>
