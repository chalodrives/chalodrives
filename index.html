<!DOCTYPE html>
<html>
<head>
  <title>ChaloDrives</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      margin:0;
      font-family: 'Segoe UI', sans-serif;
      background:#f5f7fa;
    }

    header {
      background:linear-gradient(to right,#0f172a,#1e293b);
      color:white;
      text-align:center;
      padding:30px 20px;
    }

    header img {
      height:70px;
    }

    .hero {
      background:url('https://images.unsplash.com/photo-1503376780353-7e6692767b70') center/cover;
      color:white;
      text-align:center;
      padding:60px 20px;
    }

    .hero h1 {
      font-size:32px;
    }

    .form-box {
      background:white;
      margin:20px;
      padding:20px;
      border-radius:10px;
      box-shadow:0 5px 15px rgba(0,0,0,0.1);
    }

    input {
      width:100%;
      padding:10px;
      margin:8px 0;
      border-radius:6px;
      border:1px solid #ccc;
    }

    #car-list {
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
      gap:20px;
      padding:20px;
    }

    .car-card {
      background:white;
      border-radius:10px;
      overflow:hidden;
      box-shadow:0 5px 15px rgba(0,0,0,0.1);
    }

    .car-card img {
      width:100%;
      height:160px;
      object-fit:cover;
    }

    .car-info {
      padding:15px;
    }

    .car-info h3 {
      margin:0;
    }

    button {
      width:100%;
      padding:10px;
      background:#2563eb;
      color:white;
      border:none;
      border-radius:6px;
      margin-top:10px;
      cursor:pointer;
    }

    footer {
      background:#0f172a;
      color:white;
      text-align:center;
      padding:20px;
      margin-top:30px;
    }
  </style>
</head>

<body>

<header>
  <img src="img/chalodrives-logo.png">
  <h2>ChaloDrives Rentals</h2>
  <p>Self Drive Cars in Hyderabad</p>
</header>

<div class="hero">
  <h1>Drive Your Freedom 🚗</h1>
  <p>Book premium self-drive cars instantly</p>
</div>

<div class="form-box">
  <h3>Book Your Car</h3>
  <input id="custName" placeholder="Your Name">
  <input id="pickupDate" type="date">
  <input id="location" placeholder="Pickup Location">
</div>

<div id="car-list"></div>

<footer>
  <h3>ChaloDrives</h3>
  <p>📞 9133666641 | 9912223232</p>
  <p>📧 chalodrives@gmail.com</p>
  <p>© 2025 All rights reserved</p>
</footer>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
const firebaseConfig = {
  databaseURL: "https://chalodrives-c44d7-default-rtdb.asia-southeast1.firebasedatabase.app"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

db.ref("cars").on("value", (snapshot) => {
  const data = snapshot.val();
  const container = document.getElementById("car-list");

  container.innerHTML = Object.values(data).map(car => `
    <div class="car-card">
      <img src="${car.image}">
      <div class="car-info">
        <h3>${car.name}</h3>
        <p>₹${car.price}/day</p>
        <p>${car.fuel} | ${car.seats} seats</p>
        <button onclick="bookCar('${car.name}')">Book Now</button>
      </div>
    </div>
  `).join('');
});

function bookCar(carName) {
  let name = document.getElementById("custName").value;
  let date = document.getElementById("pickupDate").value;
  let location = document.getElementById("location").value;

  if(!name || !date || !location){
    alert("Please fill all details");
    return;
  }

  let message = `Hello ChaloDrives,%0AName: ${name}%0ACar: ${carName}%0APickup Date: ${date}%0ALocation: ${location}`;

  window.open(`https://wa.me/919000509072?text=${message}`, '_blank');
}
</script>

</body>
</html>
